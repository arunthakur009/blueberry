# .woodpecker.yml — Blueberry Linux CI pipeline
# Runs on Woodpecker CI connected to a Forgejo instance.
# See doc/HOSTING.md for full infrastructure setup.

when:
  event: [push, pull_request]

# Build bpm on every push/PR
steps:
  - name: lint-bpm
    image: golang:1.22-alpine
    commands:
      - apk add --no-cache git
      - cd src/bpm
      - go fmt ./... && git diff --exit-code   # fail if fmt changes anything
      - go vet ./...

  - name: build-bpm
    image: golang:1.22-alpine
    depends_on: [lint-bpm]
    commands:
      - apk add --no-cache git
      - make bpm
      - ./obj/bpm --help
      - ./obj/bpm --version 2>/dev/null || true

  - name: test-bpm
    image: golang:1.22-alpine
    depends_on: [build-bpm]
    commands:
      - cd src/bpm && go test -race ./...

  # Full world build — runs only on main branch or tags
  - name: build-world
    image: alpine:3.20
    when:
      branch: main
      event: push
    depends_on: [build-bpm]
    commands:
      - apk add --no-cache build-base musl-dev go wget curl tar xz bzip2
          zstd cpio perl bc flex bison openssl-dev elfutils-dev
      - make world JOBS=4

  # Build all package recipes
  - name: build-packages
    image: alpine:3.20
    when:
      branch: main
      event: push
    depends_on: [build-world]
    commands:
      - make repo
      - ls -lh obj/repo/*.bb
      - ls -lh obj/repo/BBINDEX.zst

  # Sign and publish — only on main push, not PRs
  - name: sign-packages
    image: alpine:3.20
    when:
      branch: main
      event: push
    depends_on: [build-packages]
    secrets: [MINISIGN_PRIVATE_KEY]
    commands:
      - apk add --no-cache minisign
      - printf '%s' "$MINISIGN_PRIVATE_KEY" > /tmp/signing.key
      - |
        for bb in obj/repo/*.bb; do
          minisign -S -s /tmp/signing.key -m "$bb" -x "$bb.minisig"
        done
      - rm /tmp/signing.key
      - ls obj/repo/*.minisig

  - name: publish
    image: alpine:3.20
    when:
      branch: main
      event: push
    depends_on: [sign-packages]
    secrets: [REPO_SSH_KEY]
    commands:
      - apk add --no-cache openssh rsync
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s' "$REPO_SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
      - echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
      - rsync -av --delete --progress obj/repo/
          deploy@repo.blueberry.linux:/srv/blueberry/repo/packages/x86_64/
      - echo "Published to repo.blueberry.linux"
