[package]
name     = "linux"
version  = "7.1.3"
release  = 2
summary  = "The Blueberry Linux kernel (monolithic, no modules)"
homepage = "https://www.kernel.org/"
license  = ["GPL-2.0-only"]
arch     = ["x86_64"]

depends     = ["glibc"]
makedepends = ["bc", "flex", "bison", "openssl", "perl", "cpio", "xz", "pahole"]

[[source]]
url    = "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz"
sha256 = "be41c068e88f5242a19bccdbffbe077b18c47b45f627e2325504b4fab79dd1dc"

[steps]
build = '''
cd "linux-$version";
cp "$startdir/../../src/kernel/config" .config;
make olddefconfig;
make -j"$(nproc)" bzImage
'''
# Ship the kernel ONLY as a versioned file — NOT the bare /boot/vmlinuz. The
# post-install/upgrade hook (blueberry-kernel-hook) promotes the newest versioned
# kernel to /boot/vmlinuz, first stashing the previous /boot/vmlinuz as
# vmlinuz.old for a fallback boot entry. If bpm wrote /boot/vmlinuz directly it
# would clobber the running kernel before the hook could stash it.
package = '''
cd "linux-$version";
install -Dm644 arch/x86/boot/bzImage "$pkgdir/boot/vmlinuz-$version-blueberry";
install -Dm644 System.map "$pkgdir/boot/System.map-$version-blueberry";
install -Dm755 "$startdir/blueberry-grub-mkconfig" "$pkgdir/usr/bin/blueberry-grub-mkconfig";
install -Dm755 "$startdir/blueberry-kernel-hook" "$pkgdir/usr/bin/blueberry-kernel-hook"
'''

# On install and upgrade, promote the new kernel to /boot/vmlinuz (keeping the
# previous one as a fallback) and regenerate grub.cfg. This is what makes
# `bpm upgrade` pull and boot a newer kernel. See blueberry-kernel-hook.
[scripts]
post_install = "blueberry-kernel-hook"
post_upgrade = "blueberry-kernel-hook"
