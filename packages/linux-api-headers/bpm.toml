[package]
name     = "linux-api-headers"
version  = "6.18.38"
release  = 1
summary  = "Sanitized kernel headers for userspace (UAPI), matching Linux 6.18 LTS"
homepage = "https://www.kernel.org/"
license  = ["GPL-2.0-only WITH Linux-syscall-note"]
arch     = ["x86_64"]

makedepends = ["rsync"]
provides    = ["linux-headers"]

[[source]]
url    = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.38.tar.xz"
sha256 = "ac26e508abd56e9f8b89872b6e10c49fc823bcc70d8068a5d8504c1a7c4ff045"

[steps]
build = '''
cd "linux-$version";
make mrproper
'''
package = '''
cd "linux-$version";
make INSTALL_HDR_PATH="$pkgdir/usr" headers_install;
find "$pkgdir" \( -name '.install' -o -name '..install.cmd' \) -delete
'''
