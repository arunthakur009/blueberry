# /etc/network.conf — Blueberry network configuration (read by the `network`
# runit service). Default is DHCP on the first wired interface.

# Interface to configure (default: first non-loopback ethernet device).
#INTERFACE=eth0

# METHOD=dhcp (default) or static.
METHOD=dhcp

# For METHOD=static, set these:
#ADDRESS=192.168.1.50/24
#GATEWAY=192.168.1.1
#DNS="1.1.1.1 9.9.9.9"
