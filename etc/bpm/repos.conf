# bpm repositories — one line per repo: "<name> <url> [mirror2 mirror3 ...]"
# (blank lines and #comments ignored).
#
# Each url must serve a `bpm.index` (built by tools/mkrepo.sh) alongside the
# .pkg.tar.zst files. If no bpm.index is found, bpm falls back to a pacman
# database `<name>.db` at the same url — so you can point a repo straight at an
# official Arch mirror. Extra urls are MIRRORS: `bpm update` and downloads try
# each in turn and fail over when one is unreachable.
#
# Example with mirrors (your OBS-published repo + LAN mirrors):
# core https://repo.blueberry.lan/x86_64 http://mirror1.lan/blueberry/x86_64 http://mirror2.lan/blueberry/x86_64
#
# Example pointing at the official Arch repos (deps on base packages — glibc,
# bash, coreutils, ... — are skipped via /etc/bpm/provided; see `is_provided`):
# core  https://geo.mirror.pkgbuild.com/core/os/x86_64
# extra https://geo.mirror.pkgbuild.com/extra/os/x86_64
