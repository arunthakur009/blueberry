# bpm repositories — one "name url" per line (blank lines and #comments ignored).
#
# The url must serve a `bpm.index` (built by tools/mkrepo.sh from a directory of
# .pkg.tar.zst files) alongside those package files. `bpm update` fetches the
# index; `bpm install <name>` downloads and verifies the packages.
#
# Example (your OBS-published repo on the LAN):
# core http://blueberry.lan/repo/x86_64
