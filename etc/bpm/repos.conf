# bpm repositories — one line per repo: "<name> <url> [mirror2 mirror3 ...]"
# (blank lines and #comments ignored).
#
# Each url serves a `bpm.index` (built by tools/mkrepo.sh / blueberry-repo-sync)
# alongside the .pkg.tar.zst files. Both http:// and https:// work (TLS via
# BearSSL, validated against /etc/ssl/certs/ca-certificates.crt). Extra urls are
# MIRRORS: `bpm update` and downloads try each in turn and fail over.
#
# Example with a LAN mirror:
#   core https://repo.mmzsigmond.me http://192.168.0.97:81/x86_64

core https://repo.mmzsigmond.me
