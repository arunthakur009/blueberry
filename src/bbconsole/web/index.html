<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blueberry Console</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login" class="login" hidden>
    <form id="login-form" class="card">
      <h1>🫐 Blueberry Console</h1>
      <p class="muted">Enter the admin token (<code>/etc/blueberry/console/token</code>).</p>
      <input id="token" type="password" placeholder="admin token" autocomplete="off" required>
      <button type="submit">Sign in</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </div>

  <div id="app" hidden>
    <header>
      <span class="brand">🫐 Blueberry Console</span>
      <span id="hostname" class="host"></span>
      <button id="logout" class="ghost">Sign out</button>
    </header>
    <nav id="nav"></nav>
    <main id="view"></main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
