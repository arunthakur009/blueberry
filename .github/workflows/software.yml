# .github/workflows/software.yml — bpm lint / test / build
#
# Runs on every push and pull request.
# Fast feedback: does bpm compile, pass vet, and pass tests?

name: Software

on:
  push:
  pull_request:

env:
  OBJDIR: /tmp/blueberry-build

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - name: go fmt
        run: cd src/bpm && go fmt ./... && git diff --exit-code
      - name: go vet
        run: cd src/bpm && go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - run: cd src/bpm && go test -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - run: make bpm
      - name: Smoke-test binary
        run: ${{ env.OBJDIR }}/bpm --help
      - uses: actions/upload-artifact@v4
        with:
          name: bpm-${{ github.sha }}
          path: ${{ env.OBJDIR }}/bpm
          retention-days: 14
