# .github/workflows/world.yml — full OS build + QEMU smoke tests
#
# Builds the complete Blueberry Linux OS (kernel + musl + busybox + runit +
# bpm + initramfs) and verifies it boots correctly in QEMU.
#
# Triggered manually (workflow_dispatch) or weekly.
# This job is slow (~30-60 min) so it does NOT run on every push.
#
# Smoke tests performed inside QEMU:
#   1. Kernel + initramfs boots and mounts filesystems
#   2. Basic shell commands work (ls, ps, mount, uname)
#   3. Network interface comes up and gets DHCP (QEMU user networking)
#   4. bpm can update and install a package from the package repo

name: World

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'   # weekly, Sunday 02:00 UTC

env:
  OBJDIR: /tmp/blueberry-build

jobs:

  build-world:
    name: Build world
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential musl-tools wget tar xz-utils bzip2 zstd \
            cpio perl bc libelf-dev flex bison libssl-dev

      - name: Build world
        run: make world JOBS=$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: boot-${{ github.run_id }}
          path: ${{ env.OBJDIR }}/boot/
          retention-days: 7

  build-packages:
    name: Build packages (for smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential musl-tools wget tar \
            xz-utils bzip2 zstd \
            libssl-dev bc flex bison libelf-dev perl

      - name: Build package repo
        run: make repo

      - uses: actions/upload-artifact@v4
        with:
          name: repo-${{ github.run_id }}
          path: ${{ env.OBJDIR }}/repo/
          retention-days: 7

  smoke-test:
    name: QEMU smoke test
    runs-on: ubuntu-latest
    needs: [build-world, build-packages]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: boot-${{ github.run_id }}
          path: /tmp/boot/

      - uses: actions/download-artifact@v4
        with:
          name: repo-${{ github.run_id }}
          path: /tmp/repo/

      - name: Install QEMU and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 zstd cpio

      - name: Build test initramfs
        run: |
          mkdir -p /tmp/initramfs-test
          cd /tmp/initramfs-test

          # Unpack the production initramfs
          zstd -d < /tmp/boot/initramfs.cpio.zst | cpio -id --quiet

          # Inject test-init
          cp $GITHUB_WORKSPACE/src/initramfs/test-init ./test-init
          chmod 755 ./test-init

          # Add networking applets that may not be linked yet
          for app in ip udhcpc wget ping halt poweroff; do
            ln -sf /bin/busybox ./bin/$app 2>/dev/null || true
          done

          mkdir -p ./usr/bin ./etc/bpm/repos.d ./var/lib/bpm

          # Repack
          find . | sort | cpio -H newc -o --quiet | \
            zstd -19 -q > /tmp/test-initramfs.cpio.zst

          echo "Test initramfs size: $(du -sh /tmp/test-initramfs.cpio.zst | cut -f1)"

      - name: Start package repo HTTP server
        run: |
          python3 -m http.server 8080 --directory /tmp/repo &
          sleep 1
          curl -sf http://localhost:8080/BBINDEX.zst > /dev/null && \
            echo "Repo server is up" || echo "Repo server not responding (continuing)"

      - name: Boot in QEMU
        run: |
          timeout 120 qemu-system-x86_64 \
            -kernel /tmp/boot/vmlinuz \
            -initrd /tmp/test-initramfs.cpio.zst \
            -append "console=ttyS0 panic=1 init=/test-init BPMREPO=http://10.0.2.2:8080" \
            -nographic \
            -no-reboot \
            -m 512M \
            -net nic,model=virtio \
            -net user \
            2>&1 | tee /tmp/boot.log || true

      - name: Show boot log
        if: always()
        run: cat /tmp/boot.log

      - name: Check smoke test result
        run: |
          grep -q "SMOKE_TEST_RESULT=PASS" /tmp/boot.log || {
            echo "Smoke tests FAILED or VM did not complete"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boot-log-${{ github.run_id }}
          path: /tmp/boot.log
          retention-days: 7
