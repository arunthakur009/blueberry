# .github/workflows/ci.yml — Blueberry Linux CI/CD
#
# On every push/PR:   lint → test → build bpm
# On push to main:    + build world → build packages → sign → publish to repo server
#
# Required secrets (Settings → Secrets → Actions):
#   MINISIGN_PRIVATE_KEY   minisign secret key (armored, no passphrase)
#   REPO_SSH_KEY           SSH private key for rsync to the repo server
#   TAILSCALE_AUTHKEY      Tailscale auth key (if repo server is on a private network)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  OBJDIR: /tmp/blueberry-build

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint-bpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - name: fmt
        run: cd src/bpm && go fmt ./... && git diff --exit-code
      - name: vet
        run: cd src/bpm && go vet ./...

  # ── Test ────────────────────────────────────────────────────────────────────
  test-bpm:
    runs-on: ubuntu-latest
    needs: lint-bpm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - run: cd src/bpm && go test -race ./...

  # ── Build bpm ───────────────────────────────────────────────────────────────
  build-bpm:
    runs-on: ubuntu-latest
    needs: lint-bpm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - run: make bpm
      - run: ${{ env.OBJDIR }}/bpm --help
      - uses: actions/upload-artifact@v4
        with:
          name: bpm
          path: ${{ env.OBJDIR }}/bpm

  # ── Build world (main only) ──────────────────────────────────────────────────
  build-world:
    runs-on: ubuntu-latest
    needs: build-bpm
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential musl-tools wget tar xz-utils bzip2 zstd \
            cpio perl bc libelf-dev flex bison libssl-dev
      - name: Build world
        run: make world JOBS=4
      - uses: actions/upload-artifact@v4
        with:
          name: boot
          path: ${{ env.OBJDIR }}/boot/

  # ── Build packages (main only) ───────────────────────────────────────────────
  build-packages:
    runs-on: ubuntu-latest
    needs: build-world
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/bpm/go.sum
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential musl-tools wget tar \
            xz-utils bzip2 zstd
      - name: Build package repo
        run: make repo
      - run: ls -lh ${{ env.OBJDIR }}/repo/
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ${{ env.OBJDIR }}/repo/

  # ── Sign and publish (main only) ─────────────────────────────────────────────
  sign-and-publish:
    runs-on: ubuntu-latest
    needs: build-packages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: /tmp/packages/

      - name: Install minisign
        run: sudo apt-get install -y minisign

      - name: Sign packages
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          printf '%s' "$MINISIGN_PRIVATE_KEY" > /tmp/signing.key
          for bb in /tmp/packages/*.bb; do
            minisign -S -s /tmp/signing.key -m "$bb" -x "$bb.minisig"
          done
          rm /tmp/signing.key
          ls /tmp/packages/*.minisig

      # If your repo server is on a private network, connect via Tailscale first.
      # Remove this step if your server has a public IP.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Publish to repo server
        env:
          REPO_SSH_KEY: ${{ secrets.REPO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s' "$REPO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
          rsync -av --delete /tmp/packages/ \
            deploy@192.168.0.79:/srv/blueberry/repo/packages/x86_64/
          echo "Published."
