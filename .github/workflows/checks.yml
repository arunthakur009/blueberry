# .github/workflows/checks.yml — fast static checks on every push/PR.
#
# Deliberately does NOT build the package set (no makepkg / Arch container):
# that's the repo-server's job (blueberry-repo-sync) and is far too slow for CI.
# Instead it validates everything cheaply — shell scripts, package recipes, and
# the C programs (bpm + the installer) — so breakage is caught in seconds.

name: checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          # All *.sh plus the extension-less shell programs we ship.
          files=$(git ls-files '*.sh' tools/ src/initramfs/init src/initramfs/selftest \
                    src/initramfs/profile 2>/dev/null \
                  | while read -r f; do
                      case "$f" in
                        *.sh) echo "$f" ;;
                        *) head -1 "$f" 2>/dev/null | grep -q '^#!.*sh' && echo "$f" ;;
                      esac
                    done | sort -u)
          echo "Linting:"; echo "$files" | sed 's/^/  /'
          # -S warning: report warnings+errors, don't fail on style/info noise.
          echo "$files" | xargs -r shellcheck -S warning -e SC1090,SC1091

  pkgbuilds:
    name: Validate PKGBUILDs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static recipe validation
        run: bash tools/check-pkgbuilds.sh

  bpm:
    name: Build bpm + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libzstd
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev
      - name: Compile bpm (warnings as errors)
        run: make -C src/bpm CFLAGS="-Os -pipe -Wall -Wextra -Werror -std=gnu11"
      - name: Smoke test (usage exits cleanly)
        run: |
          bin=$(find src/bpm/.obj -name bpm -type f | head -1)
          "$bin" 2>&1 | grep -qi 'Blueberry Package Manager' \
            && echo "bpm usage OK" || { echo "bpm smoke failed"; exit 1; }

  installer:
    name: Build installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile blueberry-install (warnings as errors)
        run: |
          gcc -Os -pipe -Wall -Wextra -Werror -fstack-protector-strong \
            -o /tmp/blueberry-install src/installer/blueberry-install.c
          echo "installer compiles clean"
